<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PNG Editor (Advanced Multi-Color & Template)</title>

<style>
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#121212;
    color:#e0e0e0;
    padding:20px;
    line-height: 1.5;
}

.panel {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.controls{ margin-bottom:12px; display: flex; align-items: center; }
.controls label { width: 160px; font-weight: 500; }

input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; }
input[type="color"] { border: none; width: 40px; height: 30px; cursor: pointer; background: none; }

.color-step-item {
    background: #2b2b2b;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    border-left: 4px solid transparent;
}

#template-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.temp-badge {
    background: #333;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85em;
    border: 1px solid #444;
}
.temp-badge:hover { background: #444; }

#list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card { background:#1e1e1e; padding:15px; border-radius:12px; border: 1px solid #333; }
canvas { width:100%; background:#333; border-radius:8px; margin-bottom: 10px; image-rendering: pixelated; }

button {
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight: bold;
    transition: 0.2s;
}
.btn-save { background:#4caf50; color:white; width: 100%; }
.btn-action { background:#2196F3; color:white; margin-right: 5px;}
.btn-delete { background:#f44336; color:white; padding: 2px 6px; font-size: 0.7em; margin-left: 5px;}

.hidden { display: none !important; }
</style>
</head>
<body>

<h1>PNG Editor Multi-Level Color</h1>

<div class="panel">
    <div class="controls">
        <label>Mode Utama:</label>
        <select id="modeSelect" style="padding:5px; background:#333; color:white; border-radius:4px;">
            <option value="outline">White Mode (Outline Only)</option>
            <option value="polos">Full Polos (Siluet)</option>
            <option value="bw">Multi-Level Color</option>
        </select>
    </div>

    <div id="outlineGroup">
        <div class="controls">
            <label>Aktifkan Outline:</label>
            <input type="checkbox" id="enableOutline" checked>
        </div>
        <div class="controls" id="outlineSizeContainer">
            <label>Ukuran Outline:</label>
            <input type="range" id="outlineSize" min="1" max="15" value="3">
            <span id="outlineLabel" style="width:30px">3</span>px
        </div>
    </div>

    <div id="bwGroup" class="hidden" style="border-top: 1px solid #333; padding-top: 15px; margin-top: 15px;">
        <div class="controls">
            <label>Iterasi Tingkat Warna:</label>
            <input type="range" id="colorLevels" min="2" max="6" value="3">
            <span id="levelLabel">3</span>
        </div>
        
        <div id="colorStepsContainer">
            </div>

        <div class="controls" style="margin-top:15px">
            <label>Global Brightness:</label>
            <input type="range" id="brightnessSize" min="-150" max="150" value="0">
            <span id="brightnessLabel">0</span>
        </div>

        <div style="margin-top:20px; padding: 10px; background: #252525; border-radius: 8px;">
            <label><strong>Template Warna:</strong></label>
            <div style="margin-top:10px">
                <button class="btn-action" onclick="saveTemplate()">+ Simpan Template Saat Ini</button>
            </div>
            <div id="template-list"></div>
        </div>
    </div>

    <div class="controls" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
        <label>Pilih Gambar (PNG):</label>
        <input type="file" id="files" accept="image/png" multiple>
        <button id="downloadAllBtn" class="btn-action hidden" style="margin-left: 10px;">⬇️ Download Semua</button>
    </div>
</div>

<div id="list"></div>

<script>
let loadedImages = [];
let renderTimeout;
let colorData = [
    { threshold: 0, color: "#000000" },   // Tergelap (Fixed Bottom)
    { threshold: 80, color: "#ff0000" },  // Mid
    { threshold: 180, color: "#ffffff" }  // Terang
];

const elements = {
    mode: document.getElementById("modeSelect"),
    levels: document.getElementById("colorLevels"),
    levelLabel: document.getElementById("levelLabel"),
    colorContainer: document.getElementById("colorStepsContainer"),
    brightness: document.getElementById("brightnessSize"),
    brightnessLabel: document.getElementById("brightnessLabel"),
    outline: document.getElementById("enableOutline"),
    outlineSize: document.getElementById("outlineSize"),
    outlineLabel: document.getElementById("outlineLabel"),
    bwGroup: document.getElementById("bwGroup"),
    files: document.getElementById("files"),
    list: document.getElementById("list")
};

// --- Inisialisasi & UI ---

function init() {
    renderColorControls();
    loadTemplates();
    updateControlVisibility();
}

function updateControlVisibility() {
    elements.bwGroup.classList.toggle("hidden", elements.mode.value !== "bw");
    document.getElementById("outlineSizeContainer").classList.toggle("hidden", !elements.outline.checked);
}

function renderColorControls() {
    elements.colorContainer.innerHTML = "";
    const num = parseInt(elements.levels.value);
    
    // Sesuaikan panjang array colorData
    while(colorData.length < num) {
        colorData.push({ threshold: 200, color: "#ffffff" });
    }
    colorData = colorData.slice(0, num);

    colorData.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "color-step-item";
        div.style.borderColor = item.color;

        const label = index === 0 ? "Dasar (Gelap)" : (index === num-1 ? "Puncak (Terang)" : `Level ${index+1}`);
        
        div.innerHTML = `
            <label style="width:120px; font-size:0.85em">${label}</label>
            <input type="color" value="${item.color}" onchange="updateColor(${index}, this.value)">
            ${index > 0 ? `
                <input type="range" min="0" max="255" value="${item.threshold}" 
                oninput="updateThreshold(${index}, this.value)">
                <span style="width:30px; font-size:0.8em">${item.threshold}</span>
            ` : `<div style="flex-grow:1; color:#666; font-size:0.75em; text-align:center">Fixed Threshold 0</div>`}
        `;
        elements.colorContainer.appendChild(div);
    });
}

// --- Logic Data ---

function updateColor(index, val) { colorData[index].color = val; debounceRender(); renderColorControls(); }
function updateThreshold(index, val) { colorData[index].threshold = parseInt(val); debounceRender(); renderColorControls(); }

function debounceRender() {
    clearTimeout(renderTimeout);
    renderTimeout = setTimeout(() => loadedImages.forEach(obj => processImage(obj)), 50);
}

// --- Template System ---

function saveTemplate() {
    const name = prompt("Nama template:", "Template " + new Date().toLocaleTimeString());
    if(!name) return;
    const templates = JSON.parse(localStorage.getItem("img_templates") || "[]");
    templates.push({ name, data: colorData, levels: elements.levels.value });
    localStorage.setItem("img_templates", JSON.stringify(templates));
    loadTemplates();
}

function loadTemplates() {
    const container = document.getElementById("template-list");
    container.innerHTML = "";
    const templates = JSON.parse(localStorage.getItem("img_templates") || "[]");
    templates.forEach((t, i) => {
        const span = document.createElement("span");
        span.className = "temp-badge";
        span.innerHTML = `${t.name} <button class="btn-delete" onclick="deleteTemplate(${i}, event)">x</button>`;
        span.onclick = () => {
            colorData = t.data;
            elements.levels.value = t.levels;
            elements.levelLabel.textContent = t.levels;
            renderColorControls();
            debounceRender();
        };
        container.appendChild(span);
    });
}

function deleteTemplate(index, e) {
    e.stopPropagation();
    const templates = JSON.parse(localStorage.getItem("img_templates") || "[]");
    templates.splice(index, 1);
    localStorage.setItem("img_templates", JSON.stringify(templates));
    loadTemplates();
}

// --- Image Processing ---

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b };
}

function processImage({ img, canvas, ctx }) {
    const mode = elements.mode.value;
    const w = canvas.width; const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const alpha = new Uint8Array(w * h);
    for(let i=0; i<data.length; i+=4) alpha[i/4] = data[i+3];

    if (mode === "outline" || mode === "polos") {
        for(let i=0; i<data.length; i+=4) {
            if(data[i+3] > 0) { data[i]=255; data[i+1]=255; data[i+2]=255; }
        }
    } else if (mode === "bw") {
        const bri = parseInt(elements.brightness.value);
        const sortedColors = [...colorData].sort((a, b) => b.threshold - a.threshold);
        const rgbColors = sortedColors.map(c => ({...hexToRgb(c.color), t: c.threshold}));

        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] > 0) {
                const r = Math.max(0, Math.min(255, data[i] + bri));
                const g = Math.max(0, Math.min(255, data[i+1] + bri));
                const b = Math.max(0, Math.min(255, data[i+2] + bri));
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                // Cari level warna yang sesuai
                let applied = false;
                for(const c of rgbColors) {
                    if(gray >= c.t) {
                        data[i] = c.r; data[i+1] = c.g; data[i+2] = c.b;
                        applied = true; break;
                    }
                }
                if(!applied) { // Jika di bawah threshold terendah
                    const last = rgbColors[rgbColors.length-1];
                    data[i] = last.r; data[i+1] = last.g; data[i+2] = last.b;
                }
            }
        }
    }

    // Outline Logic
    if (elements.outline.checked && (mode === "outline" || mode === "bw")) {
        const size = parseInt(elements.outlineSize.value);
        const r2 = size * size;
        for(let y=0; y<h; y++) {
            for(let x=0; x<w; x++) {
                const idx = y * w + x;
                if(alpha[idx] > 0) {
                    let isEdge = false;
                    checkLoop: for(let dy=-size; dy<=size; dy++) {
                        for(let dx=-size; dx<=size; dx++) {
                            if(dx*dx + dy*dy <= r2) {
                                const nx = x+dx; const ny = y+dy;
                                if(nx<0 || ny<0 || nx>=w || ny>=h || alpha[ny*w+nx] === 0) {
                                    isEdge = true; break checkLoop;
                                }
                            }
                        }
                    }
                    if(isEdge) {
                        const p = idx*4;
                        data[p]=0; data[p+1]=0; data[p+2]=0; data[p+3]=255;
                    }
                }
            }
        }
    }
    ctx.putImageData(imageData, 0, 0);
}

// --- Events ---

elements.mode.onchange = () => { updateControlVisibility(); debounceRender(); };
elements.outline.onchange = () => { updateControlVisibility(); debounceRender(); };
elements.levels.oninput = (e) => { 
    elements.levelLabel.textContent = e.target.value; 
    renderColorControls(); 
    debounceRender(); 
};
elements.brightness.oninput = (e) => { 
    elements.brightnessLabel.textContent = e.target.value; 
    debounceRender(); 
};
elements.outlineSize.oninput = (e) => {
    elements.outlineLabel.textContent = e.target.value;
    debounceRender();
};

elements.files.onchange = e => {
    elements.list.innerHTML = ""; loadedImages = [];
    if(e.target.files.length > 0) document.getElementById("downloadAllBtn").classList.remove("hidden");
    [...e.target.files].forEach(file => {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
            const card = document.createElement("div"); card.className = "card";
            const canvas = document.createElement("canvas");
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext("2d", {willReadFrequently: true});
            const btn = document.createElement("button");
            btn.className = "btn-save"; btn.textContent = "Download";
            btn.onclick = () => {
                const a = document.createElement("a");
                a.href = canvas.toDataURL(); a.download = file.name; a.click();
            };
            card.append(canvas, btn); elements.list.appendChild(card);
            const obj = { img, canvas, ctx, file };
            loadedImages.push(obj); processImage(obj);
        };
    });
};

document.getElementById("downloadAllBtn").onclick = () => {
    loadedImages.forEach((obj, i) => {
        setTimeout(() => {
            const a = document.createElement("a");
            a.href = obj.canvas.toDataURL(); a.download = obj.file.name; a.click();
        }, i * 350);
    });
};

init();
</script>
</body>
</html>
